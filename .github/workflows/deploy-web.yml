name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "data/clean_dictionary.json"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-progress deployments
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Next.js static export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Copy dictionary data into web/public
        run: cp data/clean_dictionary.json web/public/clean_dictionary.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build (static export)
        working-directory: web
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /semantic-dictionary

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
