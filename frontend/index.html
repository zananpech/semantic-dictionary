<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semantic Dictionary — Find the Perfect Word</title>
  <meta name="description" content="A vocabulary discovery tool. Describe what you mean and find the perfect word to express yourself elegantly.">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
</head>
<body>
  <!-- Aurora Background -->
  <div class="aurora-bg">
    <div class="aurora-orb"></div>
  </div>

  <div class="app-container">
    <!-- Hero Section -->
    <header class="hero">
      <div class="hero-icon">✦</div>
      <h1>Semantic Dictionary</h1>
      <p class="hero-tagline">Describe what you mean — discover the perfect word</p>
    </header>

    <!-- Search Section -->
    <section class="search-section" id="search-section">
      <!-- Mode Toggle -->
      <div class="mode-toggle" id="mode-toggle" role="tablist">
        <button class="mode-btn active" data-mode="semantic" role="tab" aria-selected="true" id="btn-semantic">
          🔮 Find by meaning
        </button>
        <button class="mode-btn" data-mode="keyword" role="tab" aria-selected="false" id="btn-keyword">
          🔤 Find by keyword
        </button>
      </div>

      <!-- Search Input -->
      <div class="search-wrapper">
        <input
          type="text"
          class="search-input"
          id="search-input"
          placeholder="Describe the word you're looking for..."
          autocomplete="off"
          spellcheck="false"
        >
        <span class="search-icon">⌕</span>
        <button class="search-clear" id="search-clear" title="Clear search">✕</button>
        <div class="search-loading" id="search-loading">
          <div class="spinner"></div>
        </div>
      </div>
    </section>

    <!-- Results Section -->
    <section id="results-section">
      <div class="results-meta" id="results-meta" style="display: none;">
        <span class="results-count" id="results-count"></span>
      </div>
      <div class="results-grid" id="results-grid"></div>
    </section>

    <!-- Empty State (initial) -->
    <div class="empty-state" id="empty-state">
      <div class="empty-state-icon">📖</div>
      <h2 class="empty-state-title">What word are you looking for?</h2>
      <p class="empty-state-text">
        Type a description of the meaning you want to express, or search for a specific keyword.
      </p>
    </div>

    <!-- Discovery Section -->
    <div class="discovery-section" id="discovery-section">
      <p class="discovery-title">✨ Words to discover</p>
      <div class="results-grid" id="discovery-grid"></div>
    </div>
  </div>

  <!-- Bookmark Toggle Button -->
  <button class="bookmarks-toggle" id="bookmarks-toggle" title="Open bookmarks">
    🔖
    <span class="bookmarks-badge" id="bookmarks-badge"></span>
  </button>

  <!-- Bookmarks Overlay + Drawer -->
  <div class="bookmarks-overlay" id="bookmarks-overlay"></div>
  <aside class="bookmarks-drawer" id="bookmarks-drawer">
    <div class="bookmarks-header">
      <h2>🔖 Saved Words</h2>
      <button class="bookmarks-close" id="bookmarks-close" title="Close">✕</button>
    </div>
    <div class="bookmarks-list" id="bookmarks-list">
      <p class="bookmarks-empty" id="bookmarks-empty">No saved words yet.<br>Bookmark words you want to remember!</p>
    </div>
  </aside>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="/static/app.js"></script>
</body>
</html>
